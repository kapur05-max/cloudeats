<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding | CloudEats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:'Inter', sans-serif;margin:0;background:#eaf6ff;color:#222;}
  header{background:#0b3d91;color:white;padding:15px 40px;text-align:center;}
  header img{height:80px;}
  .wrap{max-width:500px;margin:60px auto;padding:0 20px;}
  .card{background:#fff;border-radius:16px;padding:36px;box-shadow:0 4px 14px rgba(0,0,0,0.08);text-align:center;}
  .tick{font-size:48px;color:#00c853;margin-bottom:10px;}
  h1{font-size:22px;color:#0b3d91;margin:0 0 12px;}
  p{color:#444;line-height:1.6;}
</style>
</head>
<body>

<header>
<img src="https://i.postimg.cc/K8THwMtq/Cloud-Eats-Logo-New.png" alt="CloudEats">
</header>

<div class="wrap">
  <div class="card">
    <div class="tick">&#10003;</div>
    <h1>Thanks for setting up your CloudEats payments</h1>
    <p>Your Stripe account setup has been received. You can safely close this window now.</p>
    <p>If you have any questions, please contact us at <strong>support@cloudeats.co.uk</strong>.</p>
  </div>
</div>

</body>
</html>
